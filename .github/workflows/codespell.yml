# Codespell configuration is within setup.cfg
---
name: Codespell

on:
  push:
    branches: [main, v0.7-dev]
  pull_request:
    branches: [main, v0.7-dev]

permissions:
  contents: read

jobs:
  codespell:
    name: Check for spelling errors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Codespell
        uses: codespell-project/actions-codespell@v2
