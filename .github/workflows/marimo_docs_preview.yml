name: Marimo Docs Preview

# Parallel/preview build of the new marimo-book documentation site (docs/book.yml).
# This is the in-progress replacement for the jupyter-book site and does NOT touch
# the live py-feat.org deploy — that stays on auto_deploy_on_release.yml /
# manual_docs.yml (jupyter-book) until the v2.x cutover.
#
# Manual (workflow_dispatch) only for now: the marimo-book build is still being
# stabilized in CI, so it must not gate ordinary docs PRs. Re-add a
# `pull_request` trigger once the build is reliably green. With deploy=true it
# publishes to the py-feat.org/preview/ gh-pages subpath without disturbing the
# live root site; otherwise it just uploads the rendered site as an artifact.
#
# The heavy detector tutorials are `mode: cached` in docs/book.yml (pre-rendered
# to docs/_rendered/ via `marimo-book render` on a GPU box), so this build does
# NOT download models or run inference; the API reference is generated by griffe
# reading source (no `import feat`).

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Publish to py-feat.org/preview/ (gh-pages subpath)"
        type: boolean
        default: false

permissions:
  contents: write # only used by the optional gh-pages preview-deploy step

concurrency:
  group: marimo-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build marimo book
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true

      # torchcodec dlopen's FFmpeg's libav* if feat gets imported while resolving
      # `dependencies: mode: env`; install it the same way the test workflow does.
      - name: Install system libraries (FFmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install py-feat + marimo-book
        run: |
          # marimo-book[api] (griffe/mkdocstrings) comes from requirements-dev.txt;
          # py-feat itself is installed so `dependencies: mode: env` resolves.
          uv venv --python 3.13
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          uv pip install . -r requirements-dev.txt

      - name: Build the book (strict link-check)
        run: |
          cd docs
          marimo-book build --strict

      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: marimo-book-site
          path: docs/_site
          if-no-files-found: error

      - name: Publish preview to gh-pages subpath
        if: github.event_name == 'workflow_dispatch' && inputs.deploy
        uses: peaceiris/actions-gh-pages@068dc23d9710f1ba62e86896f84735d869951305
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_site
          destination_dir: preview
          keep_files: true # preserve the live jupyter-book site at the gh-pages root
