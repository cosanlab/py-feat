name: Marimo Docs Preview

# Manual preview build of the marimo-book documentation site (docs/book.yml)
# with a strict link-check. The live py-feat.org deploy is fully automatic —
# tests_and_docs.yml (on push) and auto_deploy_on_release.yml (on release) build
# and publish it — so this workflow does NOT touch the live root site.
#
# workflow_dispatch only: this build installs py-feat and runs `marimo-book build
# --strict` (heavier than the cached build used on PRs), so it's kept manual to
# avoid gating ordinary docs PRs. With deploy=true it publishes to the
# py-feat.org/preview/ gh-pages subpath without disturbing the live root site;
# otherwise it just uploads the rendered site as an artifact.
#
# The heavy detector tutorials are `mode: cached` in docs/book.yml (pre-rendered
# to docs/_rendered/ via `marimo-book render` on a GPU box), so this build does
# NOT download models or run inference; the API reference is generated by griffe
# reading source (no `import feat`).

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Publish to py-feat.org/preview/ (gh-pages subpath)"
        type: boolean
        default: false

permissions:
  contents: write # only used by the optional gh-pages preview-deploy step

concurrency:
  group: marimo-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build marimo book
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      # torchcodec dlopen's FFmpeg's libav* if feat gets imported while resolving
      # `dependencies: mode: env`; install it the same way the test workflow does.
      - name: Install system libraries (FFmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install py-feat + marimo-book
        run: |
          # marimo-book[api] (griffe/mkdocstrings) comes from requirements-dev.txt;
          # py-feat itself is installed so `dependencies: mode: env` resolves.
          uv venv --python 3.13
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          uv pip install . -r requirements-dev.txt

      - name: Build the book (strict link-check)
        run: |
          cd docs
          marimo-book build --strict

      - name: Upload built site artifact
        uses: actions/upload-artifact@v7
        with:
          name: marimo-book-site
          path: docs/_site
          if-no-files-found: error

      - name: Publish preview to gh-pages subpath
        if: github.event_name == 'workflow_dispatch' && inputs.deploy
        uses: peaceiris/actions-gh-pages@1ef5a1b1df4c63fe21a2242edbee6cac921ece01  # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_site
          destination_dir: preview
          keep_files: true # preserve the live marimo site at the gh-pages root
