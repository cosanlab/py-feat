name: (Auto-On-Release) Deploy PyPi and Docs

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  deploy:
    name: Build & deploy package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Pypa build
        run: |
          python3 -m pip install build --user
      - name: Wheel and source build
        run: |
          python3 -m build --sdist --wheel --outdir dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  docs:
    name: Build & deploy docs
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      # The marimo book builds from committed _rendered/ (mode: cached) + griffe
      # reading source for the API reference, so only marimo-book is needed — no
      # feat, torch, or model downloads. Re-run `marimo-book render` + commit
      # _rendered/ when a cached tutorial's source changes.
      - name: Install marimo-book
        run: |
          uv venv --python 3.13
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          uv pip install "marimo-book[api]>=0.1.24"

      - name: Build book
        run: |
          cd docs
          marimo-book build
          echo 'py-feat.org' > _site/CNAME

      - name: Deploy docs
        uses: peaceiris/actions-gh-pages@1ef5a1b1df4c63fe21a2242edbee6cac921ece01  # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_site
