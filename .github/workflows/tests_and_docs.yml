name: Tests and Docs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches:
      - main
      - master
      - v0.7-dev

jobs:
  # Job (1): Run testing in parallel against multiples OSs and Python versions
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    # Determines whether the entire workflow should pass/fail based on parallel jobs
    continue-on-error: ${{ matrix.experimental }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        # OSs to test
        os: [ubuntu-latest, macos-latest]
        # Python versions to test
        python-version: ["3.11", "3.12", "3.13"]
        # By default everything should pass for the workflow to pass
        experimental: [false]
        include:
          # Windows sometimes fails to install due to dependency churn; let it fail without
          # blocking the matrix.
          - os: windows-latest
            python-version: "3.11"
            experimental: true
          - os: windows-latest
            python-version: "3.12"
            experimental: true
          - os: windows-latest
            python-version: "3.13"
            experimental: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      # torchcodec dlopen's FFmpeg's libav* at import time, and the pip xgboost
      # wheel dlopen's libomp.dylib on macOS. conda used to supply both; with uv
      # we install them from each runner's OS package manager instead.
      - name: Install system libraries (FFmpeg, OpenMP)
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install ffmpeg libomp
          elif [ "$RUNNER_OS" = "Windows" ]; then
            choco install ffmpeg -y
          fi

      - name: Install Dependencies
        run: uv pip install --system . -r requirements-dev.txt

      # Persist HF model downloads across runs. Without this every matrix job
      # pulls retinaface/xgb/resmasknet from the Hub at test-collection time on
      # a cold cache, and the parallel jobs intermittently trip HTTP 429
      # (Too Many Requests), failing collection. A warm cache skips the fetch.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: feat/resources/models--*
          key: hf-models-${{ runner.os }}-${{ hashFiles('feat/pretrained.py', 'feat/resources/model_list.json') }}
          restore-keys: |
            hf-models-${{ runner.os }}-
      # Actually run the tests with coverage
      - name: Run Tests
        env:
          # Authenticated requests get a far higher Hub rate limit; harmless
          # (anonymous) if the secret isn't set.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          ruff check --ignore=W292,E402,E501,E731,E741 feat
          pytest --cov=feat -rs

      # Send coverage to coveralls.io but waiting on parallelization to finish
      # Not using the official github action in the marketplace to upload because it requires a .lcov file, which pytest doesn't generate. It's just easier to use the coveralls python library which does the same thing, but works with pytest.
      - name: Upload Coverage
        # The coveralls python package has some 422 server issues with uploads from github-actions so try both service providers, for more see:
        # https://github.com/TheKevJames/coveralls-python/issues/252
        run: coveralls --service=github || coveralls --service=github-actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERALLS_FLAG_NAME: $${{ matrix}}
          COVERALLS_PARALLEL: true

  # Job (2): Send a finish notification to coveralls.io to integrate coverage across parallel tests
  coveralls:
    name: Coveralls.io Upload
    needs: test
    runs-on: ubuntu-latest
    container: python:3-slim
    continue-on-error: true
    steps:
      - name: Finished
        run: |
          pip3 install --upgrade coveralls
          coveralls --service=github --finish || coveralls --service=github-actions --finish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job (3): Build and deploy docs
  docs:
    name: Build & deploy docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # 3.12, not 3.13: jupyter-book 1.x pulls sphinx<6 whose epub3
          # builder imports the stdlib `imghdr` module, removed in 3.13.
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          # install pip=>20.1 to use "pip cache dir"
          python3 -m pip install --upgrade pip

      - name: Install deps
        run: |
          python3 -m pip install . -r requirements.txt
          python3 -m pip install -r ./requirements-dev.txt

      - name: Build book
        run: |
          jupyter-book build docs
          echo 'py-feat.org' > ./docs/_build/html/CNAME

      - name: Deploy docs
        uses: peaceiris/actions-gh-pages@068dc23d9710f1ba62e86896f84735d869951305
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html
