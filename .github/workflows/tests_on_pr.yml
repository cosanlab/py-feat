name: Tests on PR

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
      - v0.7-dev

jobs:
  # Job (1): Run testing in parallel against multiples OSs and Python versions
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    # Determines whether the entire workflow should pass/fail based on parallel jobs
    continue-on-error: ${{ matrix.experimental }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        # OSs to test
        os: [ubuntu-latest, macos-latest]
        # Python versions to test
        python-version: ["3.11", "3.12", "3.13"]
        # By default everything should pass for the workflow to pass
        experimental: [false]
        include:
          # Windows sometimes fails to install due to dependency churn; let it fail without
          # blocking the matrix.
          - os: windows-latest
            python-version: "3.11"
            experimental: true
          - os: windows-latest
            python-version: "3.12"
            experimental: true
          - os: windows-latest
            python-version: "3.13"
            experimental: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      # torchcodec dlopen's FFmpeg's libav* at import time, and the pip xgboost
      # wheel dlopen's libomp.dylib on macOS. conda used to supply both; with uv
      # we install them from each runner's OS package manager instead.
      - name: Install system libraries (FFmpeg, OpenMP)
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install ffmpeg libomp
          elif [ "$RUNNER_OS" = "Windows" ]; then
            choco install ffmpeg -y
          fi

      - name: Install Dependencies
        run: |
          # uv won't install into a uv-managed Python with --system ("No system
          # Python installation found"), so create an explicit venv and put it on
          # PATH for later steps (.venv/bin on Linux/macOS, .venv/Scripts on Windows).
          uv venv --python ${{ matrix.python-version }}
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "$PWD/.venv/Scripts" >> "$GITHUB_PATH"
          uv pip install . -r requirements-dev.txt

      # Persist HF model downloads across runs. Without this every matrix job
      # pulls retinaface/xgb/resmasknet from the Hub at test-collection time on
      # a cold cache, and the parallel jobs intermittently trip HTTP 429
      # (Too Many Requests), failing collection. A warm cache skips the fetch.
      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: feat/resources/models--*
          key: hf-models-${{ runner.os }}-${{ hashFiles('feat/pretrained.py', 'feat/resources/model_list.json') }}
          restore-keys: |
            hf-models-${{ runner.os }}-
      # Actually run the tests with coverage
      - name: Run Tests
        env:
          # Authenticated requests get a far higher Hub rate limit; harmless
          # (anonymous) if the secret isn't set.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          ruff check --ignore=W292,E402,E501,E731,E741 feat
          pytest --cov=feat -rs

  # Job (3): Just build the marimo book but don't deploy it.
  docs:
    name: Build docs only
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      # The marimo book builds from committed _rendered/ (mode: cached) + griffe
      # reading source for the API reference, so only marimo-book is needed — no
      # feat, torch, or model downloads.
      - name: Install marimo-book
        run: |
          uv venv --python 3.13
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          uv pip install "marimo-book[api]>=0.1.24"

      - name: Build book
        run: |
          cd docs
          marimo-book build
