[bumpversion]
current_version = 0.7.0
commit = True
tag = True

[bumpversion:file:feat/version.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[metadata]
description-file = README.md

[bdist_wheel]
universal = 1

[aliases]
test = pytest

[tool:pytest]
# Custom markers registered so ``pytest -m`` selectors don't warn.
# Use ``-m "not network"`` for offline runs.
markers =
    network: tests that perform real HuggingFace Hub or other network I/O

[codespell]
# Ref: https://github.com/codespell-project/codespell#using-a-config-file
# Skips: build artifacts, generated files, binary fixtures, and Jupyter
# notebooks (their cell outputs include base64-encoded image data that
# trips codespell with high false-positive rates; real prose typos in
# markdown cells are still caught manually during code review).
skip = .git,*.svg,*.css,*.js,*.lock,*.pdf,*.png,*.jpg,*.jpeg,*.ipynb,*.ipynb_checkpoints,*.csv,feat/resources,docs/_build,*/_rendered/*,*/_site/*,*/_site_src/*,*/__marimo__/*,*/news_sample/*,.venv,.tox,build,dist,*.egg-info,htmlcov
check-hidden = true
# Common false positives in py-feat code:
# - "ists" appears in "exists" splits across line breaks in some old comments
# - "gaus" is shorthand for gaussian, used as variable names in feat.utils.stats
# - "nd" appears as a numpy idiom (e.g. "nd.array")
# - "ttest" is the scipy.stats function name (ttest_1samp, ttest_ind)
# - "tesselation" is MediaPipe's official constant spelling
#   (FACEMESH_TESSELATION). plot_face_mesh accepts both single-l and
#   double-l ("tessellation") spellings; the API docs use MP's single-l.
# - "strat" is shorthand for stratified CV in the AU training scripts
ignore-words-list = ists,gaus,nd,ttest,tesselation,strat
