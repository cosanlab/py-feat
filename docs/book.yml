# marimo-book config for the Py-Feat documentation site.
# Migrated from jupyter-book (_config.yml + _toc.yml) on the docs-marimo branch.
title: Py-Feat
description: >
  Python Facial Expression Analysis Toolbox — detect and analyze facial
  action units, emotions, landmarks, identity, and head pose from images
  and videos.
authors:
  - name: Eshin Jolly
  - name: Jin Hyun Cheong
  - name: Tiankang Xie
  - name: Luke J. Chang
    affiliation: Dartmouth College
copyright: "2022"
repo: https://github.com/cosanlab/py-feat
# molab / "edit this page" / download links resolve against this branch.
# Update to `main` at the v2.0 cutover.
branch: v0.7-dev
url: https://py-feat.org/
logo: images/logo/pyfeat_logo_small.png
favicon: images/logo/favicon.ico
# Large logo above the left nav, matching the previous jupyter-book site.
logo_placement: sidebar

launch_buttons:
  molab: true
  github: true
  download: true

# The docs build environment has py-feat installed; notebooks render against it.
dependencies:
  mode: env

# Resolve [Heading text][] cross-page references (MyST {ref} analog).
cross_references: true

# Auto-generated API reference (Workstream E) from feat's Google-style
# docstrings. Griffe reads source straight from the repo root (..), so the
# build never imports feat (no torch load / model download). Curated to the
# user-facing API; model-internal detector subpackages and the experimental,
# soon-to-be-removed MPDetector are intentionally omitted. Appends an "API
# Reference" nav section automatically — no toc entry needed. Requires
# `pip install 'marimo-book[api]'`.
api_docs:
  enabled: true
  docstring_style: google
  paths: [".."]
  packages:
    - feat.detector
    - feat.detector_v2
    - feat.data
    - feat.plotting
    - feat.pretrained
    - feat.utils
    - feat.transforms
  # feat's docstrings are Google-style with wrapped (under-indented) parameter
  # descriptions and few signature type annotations, so griffe emits hundreds of
  # non-fatal parse warnings (missing types, wrapped lines mis-read as params).
  # The rendered API reference is unaffected, so silence the docstring parser
  # rather than churn every docstring. Re-enable if the docstrings are normalized.
  options:
    docstring_options:
      warnings: false

# NOTE: Google Analytics (old UA-113777015-5) is Universal Analytics, which
# Google retired. Wire a GA4 property here when one exists:
#   analytics: { provider: google, property: G-XXXXXXXX }

# Heavy detector tutorials render with `mode: cached`: executed once locally
# with a GPU via `marimo-book render`, committed to _rendered/, then reused on
# CI without executing. defaults.mode stays static for the prose pages.

# Auto-generated Py-feat Live changelog (pages/pyfeatlive_changelog.md).
# Regenerate with `marimo-book sync-releases`; kept current via a
# repository_dispatch from pyfeat-live's release workflow (drafts excluded).
release_notes:
  repo: cosanlab/pyfeat-live
  output: pages/pyfeatlive_changelog.md
  title: "Py-feat Live — Changelog"

toc:
  - file: pages/intro.md

  - section: Getting Started
    children:
      - file: pages/installation.md
      - file: pages/models.md
      - file: pages/au_reference.md
        title: AU Reference
      - file: pages/faqs.md

  # Tutorials — added incrementally as each notebook is rendered to _rendered/.
  - section: Tutorials
    children:
      - file: basic_tutorials/Detecting_Images.py
        mode: cached
      - file: basic_tutorials/Detecting_Videos.py
        mode: cached
      - file: basic_tutorials/Plotting.py
        mode: cached
      - file: basic_tutorials/Analysis.py
        mode: cached
      - file: basic_tutorials/Performance.py
        mode: cached

  - section: Py-feat Live
    children:
      - file: pages/pyfeat_live.md
      - file: pages/pyfeatlive_changelog.md

  # API Reference is auto-generated from docstrings via the top-level
  # `api_docs` block above and appended to the nav automatically.

  - section: Benchmarks
    children:
      - file: benchmarks/Speed.py
        mode: cached
      - file: benchmarks/accuracy.md

  - section: Contributing
    children:
      - file: pages/contribute.md
      - file: pages/modelContribution.md
      - file: pages/changelog.md
      - url: https://github.com/cosanlab/py-feat
        title: GitHub Repository
